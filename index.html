<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VoiceMaster 🎤</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0b0f1a;color:#f1f5f9;font-family:-apple-system,system-ui,sans-serif;min-height:100dvh}
#app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative;padding-bottom:50px}
.pg{display:none}.pg.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sp{to{transform:rotate(360deg)}}
.cd{background:rgba(255,255,255,.04);border-radius:18px;border:1px solid rgba(255,255,255,.07);padding:16px;margin-bottom:10px}
.bt{display:block;width:100%;border:none;border-radius:14px;color:#fff;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;transition:.12s;text-align:center}
.bt:active{transform:scale(.97)}.bt:disabled{opacity:.4;cursor:not-allowed}
.inp{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#f1f5f9;font-size:15px;outline:none;margin-top:6px}
.inp:focus{border-color:#8b5cf688}.inp::placeholder{color:#475569}
.bk{background:rgba(255,255,255,.07);border:none;border-radius:10px;color:#f1f5f9;padding:8px 12px;font-size:15px;cursor:pointer}
.lb{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.rw{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rw:last-child{border-bottom:none}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.wav{width:100%;height:70px;border-radius:12px;background:#080c16;border:1px solid rgba(255,255,255,.06)}
.bar-t{height:7px;border-radius:4px;background:#1e293b;overflow:hidden;margin-top:3px}
.bar-f{height:100%;border-radius:4px;width:0;transition:width 1s cubic-bezier(.25,1,.5,1)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.pulse-dot{animation:pu 1.5s infinite}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="p-home" class="pg on">
  <div style="text-align:center;padding-top:46px">
    <div style="font-size:54px;animation:bn 2s infinite">🎤</div>
    <h1 style="font-size:32px;font-weight:900;margin-top:6px;background:linear-gradient(135deg,#ec4899,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">VoiceMaster</h1>
    <p style="color:#64748b;font-size:12px;margin-top:4px">Voice Impression Challenge</p>
    <div style="width:40px;height:2px;background:linear-gradient(90deg,#ec4899,#8b5cf6);margin:14px auto 24px;border-radius:2px"></div>
  </div>
  <div style="padding:0 20px">
    <div class="cd"><div class="lb">Your Name</div><input class="inp" id="iName" placeholder="Enter name..." maxlength="20"><div id="nErr" style="color:#f87171;font-size:11px;margin-top:4px;display:none"></div></div>
    <button class="bt" style="background:linear-gradient(135deg,#ec4899,#db2777)" id="bCreate">🎮 Create Room (Host)</button>
    <button class="bt" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)" id="bJoinNav">🔗 Join a Room</button>
    <button class="bt" style="background:linear-gradient(135deg,#06b6d4,#0891b2)" id="bSolo">🎭 Solo Practice</button>
  </div>
</div>

<!-- JOIN -->
<div id="p-join" class="pg">
  <div style="padding:14px 18px 6px;display:flex;align-items:center;gap:10px"><button class="bk" id="bJoinBk">←</button><h2 style="font-size:17px;font-weight:800">Join Room</h2></div>
  <div style="padding:6px 20px">
    <div class="cd" style="text-align:center">
      <div style="font-size:40px;margin-bottom:6px">🔗</div>
      <p style="color:#94a3b8;font-size:12px;margin-bottom:10px">Enter the code the host gave you</p>
      <input class="inp" id="iJoinCode" placeholder="ROOM CODE" maxlength="6" style="text-align:center;letter-spacing:8px;font-size:24px;font-weight:800;text-transform:uppercase">
      <div id="joinErr" style="color:#f87171;font-size:11px;margin-top:6px;display:none"></div>
      <button class="bt" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)" id="bJoin">Join Game</button>
      <div id="joinStatus" style="display:none;margin-top:10px;font-size:12px;color:#a78bfa"></div>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="p-lobby" class="pg">
  <div style="padding:14px 18px 6px;display:flex;align-items:center;gap:10px"><button class="bk" id="bLobbyBk">←</button><h2 style="font-size:17px;font-weight:800">Game Lobby</h2></div>
  <div style="padding:4px 20px;text-align:center">
    <div class="cd" style="background:linear-gradient(135deg,rgba(236,72,153,.1),rgba(139,92,246,.06))">
      <div class="lb" style="letter-spacing:3px">Room Code</div>
      <div id="lobCode" style="font-size:30px;font-weight:900;letter-spacing:8px;color:#ec4899;margin-top:2px"></div>
      <p style="color:#64748b;font-size:10px;margin-top:4px">Tell your friends to enter this code!</p>
    </div>
    <div id="lobStatus" style="font-size:11px;margin-bottom:6px"></div>
    <div id="lobPlayers" class="cd" style="text-align:left"></div>
    <div id="lobWait" style="text-align:center;padding:6px;color:#a78bfa;font-size:11px"><span class="dot pulse-dot" style="background:#22c55e"></span>Waiting for players to join...</div>
    <button class="bt" style="background:linear-gradient(135deg,#ec4899,#db2777)" id="bStart" disabled>🚀 Start Game!</button>
    <div id="lobGuest" style="display:none;color:#94a3b8;font-size:12px;margin-top:10px">Waiting for host to start the game...</div>
  </div>
</div>

<!-- WAITING (other player's turn) -->
<div id="p-wait" class="pg">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center">
    <div style="padding:20px">
      <div id="waitRound" class="lb" style="letter-spacing:3px"></div>
      <div id="waitEmoji" style="font-size:50px;margin:12px 0"></div>
      <h3 id="waitChar" style="font-size:20px;font-weight:800"></h3>
      <div class="cd" style="margin-top:16px;background:rgba(139,92,246,.08)">
        <p id="waitMsg" style="font-size:16px;font-weight:700;color:#8b5cf6;margin:0"></p>
        <div style="width:28px;height:28px;border:3px solid #8b5cf6;border-top-color:transparent;border-radius:50%;animation:sp 1s linear infinite;margin:12px auto 0"></div>
      </div>
      <div id="waitScores" class="cd" style="text-align:left;display:none"></div>
    </div>
  </div>
</div>

<!-- MY TURN (record) -->
<div id="p-rec" class="pg">
  <div style="padding:14px 18px 6px;display:flex;align-items:center;gap:10px"><span id="recLabel" style="font-size:12px;color:#64748b;font-weight:600"></span></div>
  <div style="padding:0 20px;text-align:center">
    <div id="recHead" class="cd"></div>
    <div id="recPhrase" class="cd" style="text-align:left"></div>
    <div id="recTip" class="cd" style="text-align:left"></div>
    <button class="bt" style="background:linear-gradient(135deg,#f59e0b,#d97706)" id="bListen">🔊 Listen to Character Voice</button>
    <p style="font-size:8px;color:#475569;margin:4px 0 6px">AI voice approximation</p>
    <div style="margin:8px 0"><canvas id="wav" class="wav" width="320" height="70"></canvas></div>
    <div id="recTimer" style="display:none;margin-bottom:8px"><span id="timerV" style="font-size:24px;font-weight:900;color:#ec4899">0.0s</span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;margin-left:6px;animation:pu 1s infinite"></span></div>
    <div id="recAnalyze" style="display:none" class="cd"></div>
    <div id="recMicErr" style="display:none"></div>
    <div id="recCD" style="display:none;font-size:60px;font-weight:900;margin:16px 0"></div>
    <button class="bt" style="background:linear-gradient(135deg,#ec4899,#db2777)" id="bRec">🎤 Record My Impression</button>
    <button class="bt" style="background:linear-gradient(135deg,#ef4444,#dc2626);display:none" id="bStop">⏹ Stop & Analyze</button>
  </div>
</div>

<!-- RESULTS -->
<div id="p-res" class="pg"><div id="resBody" style="padding:20px;text-align:center"></div></div>

<!-- ROUND SUMMARY -->
<div id="p-rsum" class="pg"><div id="rsumBody" style="padding:20px;text-align:center"></div></div>

<!-- FINAL -->
<div id="p-fin" class="pg"><div id="finBody" style="padding:20px;text-align:center"></div></div>

<!-- SOLO CHARS -->
<div id="p-chars" class="pg">
  <div style="padding:14px 18px 6px;display:flex;align-items:center;gap:10px"><button class="bk" id="bCharsBk">←</button><h2 style="font-size:17px;font-weight:800">Choose Character</h2></div>
  <div id="charGrid" style="padding:8px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
</div>

</div>

function startHeartbeat(conn,label){
  var key=conn.peer||label;
  if(heartbeatTimers[key])clearTimers(key);
  heartbeatTimers[key]={lastPong:Date.now()};
  heartbeatTimers[key].ping=setInterval(function(){
    try{conn.send({type:'ping'});}catch(e){}
  },HEARTBEAT_INTERVAL);
  heartbeatTimers[key].check=setInterval(function(){
    if(Date.now()-heartbeatTimers[key].lastPong>HEARTBEAT_TIMEOUT){
      addLog('💀 '+label+' timed out');
      clearTimers(key);
      try{conn.close();}catch(e){}
    }
  },HEARTBEAT_INTERVAL);
}
function handlePong(conn){
  var key=conn.peer||'host';
  if(heartbeatTimers[key])heartbeatTimers[key].lastPong=Date.now();
}
function clearTimers(key){
  if(!heartbeatTimers[key])return;
  clearInterval(heartbeatTimers[key].ping);
  clearInterval(heartbeatTimers[key].check);
  delete heartbeatTimers[key];
}

/* ═══ DUPLICATE NAME HANDLER ═══ */
function uniqueName(name,existingNames){
  if(existingNames.indexOf(name)<0)return name;
  var n=2;while(existingNames.indexOf(name+'('+n+')')>=0)n++;
  return name+'('+n+')';
}

/* ═══ DISCONNECTED PLAYER HANDLER ═══ */
function handlePlayerDisconnectDuringGame(playerName){
  if(!G.gameStarted)return;
  addLog('⚠️ '+playerName+' disconnected during game');
  /* Auto-submit a zero score for the disconnected player so game doesn't get stuck */
  var roundScores=G.turnScores.filter(function(s){return s.round===G.round;});
  var alreadyScored=roundScores.some(function(s){return s.player===playerName;});
  if(!alreadyScored){
    G.turnScores.push({player:playerName,score:0,round:G.round});
    if(!G.scores[playerName])G.scores[playerName]=0;
    roundScores=G.turnScores.filter(function(s){return s.round===G.round;});
    if(roundScores.length>=G.players.length){
      broadcast({type:'round_end',turnScores:G.turnScores,scores:G.scores,round:G.round});
      showRoundSummary();
    }else{
      var nextIdx=roundScores.length;
      broadcast({type:'turn',round:G.round,charId:G.char.id,phrase:G.phrase,turnPlayer:G.players[nextIdx],turnIdx:nextIdx,turnScores:G.turnScores,scores:G.scores});
      handleMyTurn(G.players[nextIdx]);
    }
  }
}

/* ═══ CONNECTION CLEANUP ═══ */
function cleanupConnection(){
  if(peer)try{peer.destroy();}catch(e){}
  peer=null;conns=[];hostConn=null;
  Object.keys(heartbeatTimers).forEach(clearTimers);
  G.gameStarted=false;
}

/* ═══ PEERJS MULTIPLAYER ═══ */
function createRoom(){
  if(!nm())return;

  /* Protocol check */
  if(location.protocol==='file:'){
    $('nErr').innerHTML='⚠️ Multiplayer needs a website! Upload this file to <a href="https://tiiny.host" target="_blank" style="color:#8b5cf6">tiiny.host</a> first.';
    $('nErr').style.display='block';return;
  }

  G.isHost=true;G.code=gc();G.players=[G.name];G.scores={};G.round=0;G.turnScores=[];
  var prefix='vm-'+G.code.toLowerCase();
  if(peer)peer.destroy();

  peer=new Peer(prefix, PEER_CONFIG);
  peer.on('open',function(id){
    addLog('✅ Room ready! ID: '+id+' | Waiting for players...');
    console.log('[VM] HOST: Peer registered as',id);
    renderLobby();go('p-lobby');
    /* Keep connection alive by checking periodically */
    setInterval(function(){
      if(peer&&peer.disconnected){addLog('⚠️ Reconnecting...');try{peer.reconnect();}catch(e){}}
    },15000);
  });
  peer.on('connection',function(conn){
    console.log('[VM] HOST: New connection from',conn.metadata?.name||'unknown');
    addLog('🔗 New player connecting...');
    conn.on('open',function(){
      console.log('[VM] HOST: Connection opened with',conn.metadata?.name);
      startHeartbeat(conn,conn.metadata?.name||conn.peer);
    });
    conn.on('data',function(d){
      if(d.type==='pong'){handlePong(conn);return;}
      if(d.type==='ping'){try{conn.send({type:'pong'});}catch(e){}return;}
      hostHandle(conn,d);
    });
    conn.on('close',function(){
      clearTimers(conn.peer);
      var disconnectedName=conn.metadata&&conn.metadata.name;
      conns=conns.filter(function(c){return c!==conn;});
      if(disconnectedName){
        /* Grace period: wait 3s to allow reconnection before removing player */
        setTimeout(function(){
          var reconnected=conns.some(function(c){return c.metadata&&c.metadata.name===disconnectedName;});
          if(!reconnected){
            G.players=G.players.filter(function(p){return p!==disconnectedName;});
            if(G.isHost&&G.gameStarted)handlePlayerDisconnectDuringGame(disconnectedName);
            broadcastLobby();renderLobby();
          }
        },3000);
      }
      addLog('👋 Player disconnected'+(disconnectedName?' ('+disconnectedName+')':''));
    });
    conn.on('error',function(err){
      console.log('[VM] HOST: Connection error with',conn.metadata?.name,err);
    });
    conns.push(conn);
  });
  peer.on('error',function(e){
    console.log('[VM] HOST error:',e.type,e);
    if(e.type==='unavailable-id'){G.code=gc();createRoom();return;}
    addLog('⚠️ Error: '+e.type);
    $('nErr').textContent='Connection error: '+e.type;$('nErr').style.display='block';
  });
  peer.on('disconnected',function(){
    addLog('⚠️ Disconnected from server, reconnecting...');
    console.log('[VM] HOST: Disconnected, attempting reconnect');
    try{peer.reconnect();}catch(e){console.log('[VM] Reconnect failed:',e);}
  });
}

function joinRoom(){
  var code=$('iJoinCode').value.trim().toUpperCase();
  if(!code||code.length<3){$('joinErr').textContent='Enter a valid code!';$('joinErr').style.display='block';return;}
  if(!nm())return;

  if(location.protocol==='file:'){
    $('joinErr').innerHTML='⚠️ <b>Cannot connect from a local file!</b><br>Upload to <a href="https://tiiny.host" target="_blank" style="color:#8b5cf6">tiiny.host</a> first.';
    $('joinErr').style.display='block';return;
  }

  G.isHost=false;G.code=code;
  $('joinErr').style.display='none';
  var prefix='vm-'+code.toLowerCase();
  var attempt=0;var maxAttempts=3;

  function tryConnect(){
    attempt++;
    $('joinStatus').innerHTML='<div style="width:20px;height:20px;border:2px solid #8b5cf6;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px"></div>Connecting... (attempt '+attempt+'/'+maxAttempts+')';
    $('joinStatus').style.display='block';

    if(peer)try{peer.destroy();}catch(e){}
    peer=new Peer(undefined, PEER_CONFIG);

    var connected=false;
    var timeout=setTimeout(function(){
      if(!connected){
        console.log('[VM] Attempt '+attempt+' timed out');
        try{peer.destroy();}catch(e){}
        if(attempt<maxAttempts){
          $('joinStatus').innerHTML='<span style="color:#fbbf24;font-size:11px">⏳ Retrying in 2 seconds... ('+attempt+'/'+maxAttempts+')</span>';
          setTimeout(tryConnect,2000);
        }else{
          $('joinStatus').style.display='none';
          $('joinErr').innerHTML='❌ Could not find room "<b>'+code+'</b>" after '+maxAttempts+' attempts.<br><span style="font-size:10px;color:#94a3b8">Make sure:<br>• The host still has the room open<br>• Both of you use the SAME link ('+location.origin+')<br>• The code is typed correctly</span>';
          $('joinErr').style.display='block';
        }
      }
    },8000);

    peer.on('open',function(myId){
      console.log('[VM] Attempt '+attempt+': My peer ID:',myId,'. Looking for:',prefix);
      $('joinStatus').innerHTML='<div style="width:20px;height:20px;border:2px solid #22c55e;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px"></div>Connected to server! Looking for room '+code+'...';

      setTimeout(function(){
        hostConn=peer.connect(prefix,{metadata:{name:G.name},reliable:true,serialization:'json'});
        if(!hostConn){
          if(attempt<maxAttempts){setTimeout(tryConnect,2000);}
          return;
        }
        hostConn.on('open',function(){
          connected=true;clearTimeout(timeout);
          console.log('[VM] Connected to host!');
          hostConn.send({type:'join',name:G.name});
          startHeartbeat(hostConn,'host');
          $('joinStatus').innerHTML='<span class="dot" style="background:#22c55e"></span> Connected! Joining lobby...';
        });
        hostConn.on('data',function(d){
          if(d.type==='pong'){handlePong(hostConn);return;}
          if(d.type==='ping'){try{hostConn.send({type:'pong'});}catch(e){}return;}
          guestHandle(d);
        });
        hostConn.on('close',function(){
          clearTimers('host');
          addLog('⚠️ Lost connection to host, attempting to reconnect...');
          guestReconnect();
        });
        hostConn.on('error',function(err){
          console.log('[VM] Conn error:',err);
          if(!connected&&attempt<maxAttempts){clearTimeout(timeout);setTimeout(tryConnect,2000);}
        });
      },500);
    });

    peer.on('error',function(e){
      console.log('[VM] Peer error attempt '+attempt+':',e.type);
      if(e.type==='peer-unavailable'&&!connected){
        clearTimeout(timeout);
        if(attempt<maxAttempts){
          $('joinStatus').innerHTML='<span style="color:#fbbf24;font-size:11px">⏳ Room not found yet, retrying... ('+attempt+'/'+maxAttempts+')</span>';
          setTimeout(tryConnect,2000);
        }else{
          $('joinStatus').style.display='none';
          $('joinErr').innerHTML='❌ Room "<b>'+code+'</b>" not found!<br><span style="font-size:10px;color:#94a3b8">The host needs to keep the room page open.<br>Make sure you\'re both on: '+location.origin+'</span>';
          $('joinErr').style.display='block';
        }
      }else if(!connected){
        clearTimeout(timeout);
        $('joinStatus').style.display='none';
        $('joinErr').innerHTML='Error: '+e.type;$('joinErr').style.display='block';
      }
    });
    peer.on('disconnected',function(){
      console.log('[VM] GUEST: PeerJS server disconnected, reconnecting...');
      addLog('⚠️ Disconnected from server, reconnecting...');
      try{peer.reconnect();}catch(e){console.log('[VM] Guest reconnect failed:',e);}
    });
  }

  tryConnect();
}

/* GUEST: reconnect to host after disconnection */
function guestReconnect(){
  if(!G.code)return;
  var prefix='vm-'+G.code.toLowerCase();
  var rAttempt=0;var maxReconn=5;
  function tryReconn(){
    rAttempt++;
    if(rAttempt>maxReconn){
      alert('Unable to reconnect to host after '+maxReconn+' attempts. Please check your connection and try rejoining the room.');
      cleanupConnection();go('p-home');return;
    }
    addLog('🔄 Reconnect attempt '+rAttempt+'/'+maxReconn+'...');
    if(!peer||peer.destroyed){
      peer=new Peer(undefined, PEER_CONFIG);
      peer.on('open',function(){doReconn();});
      peer.on('error',function(e){
        console.log('[VM] Reconnect peer error:',e.type);
        if(rAttempt<maxReconn)setTimeout(tryReconn,3000);
        else{alert('Unable to reconnect to the game server. Please try creating or joining a new room.');cleanupConnection();go('p-home');}
      });
      peer.on('disconnected',function(){
        console.log('[VM] GUEST: PeerJS server disconnected, reconnecting...');
        try{peer.reconnect();}catch(e){console.log('[VM] Reconnect failed:',e);}
      });
    }else if(peer.disconnected){
      try{peer.reconnect();}catch(e){}
      setTimeout(doReconn,1000);
    }else{
      doReconn();
    }
    function doReconn(){
      hostConn=peer.connect(prefix,{metadata:{name:G.name},reliable:true,serialization:'json'});
      if(!hostConn){if(rAttempt<maxReconn)setTimeout(tryReconn,3000);return;}
      var reconnected=false;
      var rTimeout=setTimeout(function(){
        if(!reconnected&&rAttempt<maxReconn)setTimeout(tryReconn,3000);
      },8000);
      hostConn.on('open',function(){
        reconnected=true;clearTimeout(rTimeout);
        console.log('[VM] Reconnected to host!');
        addLog('✅ Reconnected!');
        hostConn.send({type:'rejoin',name:G.name});
        startHeartbeat(hostConn,'host');
      });
      hostConn.on('data',function(d){
        if(d.type==='pong'){handlePong(hostConn);return;}
        if(d.type==='ping'){try{hostConn.send({type:'pong'});}catch(e){}return;}
        guestHandle(d);
      });
      hostConn.on('close',function(){
        clearTimers('host');
        if(rAttempt<maxReconn)setTimeout(tryReconn,3000);
        else{alert('Host connection lost and reconnection failed. Returning to home screen.');cleanupConnection();go('p-home');}
      });
      hostConn.on('error',function(err){
        console.log('[VM] Reconnect conn error:',err);
        if(!reconnected&&rAttempt<maxReconn){clearTimeout(rTimeout);setTimeout(tryReconn,3000);}
      });
    }
  }
  setTimeout(tryReconn,2000);
}

/* HOST: handle messages from guests */
function hostHandle(conn,msg){
  if(msg.type==='join'){
    var safeName=uniqueName(msg.name,G.players);
    conn.metadata={name:safeName};
    if(G.players.indexOf(safeName)<0)G.players.push(safeName);
    /* Let the guest know their actual name (in case it was changed) */
    try{conn.send({type:'name_assigned',name:safeName});}catch(e){}
    broadcastLobby();renderLobby();
  }
  if(msg.type==='rejoin'){
    /* Player reconnecting - re-add if missing */
    conn.metadata={name:msg.name};
    if(G.players.indexOf(msg.name)<0)G.players.push(msg.name);
    startHeartbeat(conn,msg.name);
    broadcastLobby();renderLobby();
    /* If game is in progress, send current state */
    if(G.gameStarted&&G.char){
      var roundScores=G.turnScores.filter(function(s){return s.round===G.round;});
      var currentTurnIdx=roundScores.length;
      var currentTurnPlayer=currentTurnIdx<G.players.length?G.players[currentTurnIdx]:null;
      try{conn.send({type:'turn',round:G.round,charId:G.char.id,phrase:G.phrase,turnPlayer:currentTurnPlayer||G.players[0],turnIdx:currentTurnIdx,turnScores:G.turnScores,scores:G.scores});}catch(e){}
    }
    addLog('🔄 '+msg.name+' reconnected!');
  }
  if(msg.type==='score'){
    G.turnScores.push({player:msg.name,score:msg.score,round:G.round});
    if(!G.scores[msg.name])G.scores[msg.name]=0;
    G.scores[msg.name]+=msg.score;
    // Check if all players scored this round
    var roundScores=G.turnScores.filter(function(s){return s.round===G.round;});
    if(roundScores.length>=G.players.length){
      broadcast({type:'round_end',turnScores:G.turnScores,scores:G.scores,round:G.round});
      showRoundSummary();
    }else{
      // Next player's turn
      var nextIdx=roundScores.length;
      broadcast({type:'turn',round:G.round,charId:G.char.id,phrase:G.phrase,turnPlayer:G.players[nextIdx],turnIdx:nextIdx,turnScores:G.turnScores,scores:G.scores});
      handleMyTurn(G.players[nextIdx]);
    }
  }
}

function broadcastLobby(){broadcast({type:'lobby',players:G.players,code:G.code});}
function broadcast(msg){conns.forEach(function(c){try{c.send(msg);}catch(e){}});}

/* GUEST: handle messages from host */
function guestHandle(msg){
  if(msg.type==='name_assigned'){
    /* Host may have changed our name to avoid duplicates */
    if(msg.name!==G.name){
      addLog('ℹ️ Name changed to "'+msg.name+'" to avoid duplicate');
      G.name=msg.name;
    }
  }
  if(msg.type==='lobby'){
    G.players=msg.players;G.code=msg.code;renderLobby();go('p-lobby');
  }
  if(msg.type==='turn'){
    G.gameStarted=true;
    G.round=msg.round;G.char=CH.find(function(c){return c.id===msg.charId;});G.phrase=msg.phrase;
    G.turnIdx=msg.turnIdx;G.turnScores=msg.turnScores||[];G.scores=msg.scores||{};
    handleMyTurn(msg.turnPlayer);
  }
  if(msg.type==='round_end'){
    G.turnScores=msg.turnScores;G.scores=msg.scores;G.round=msg.round;
    showRoundSummary();
  }
  if(msg.type==='game_end'){
    G.scores=msg.scores;showFinal();
  }
  if(msg.type==='next_round'){
    G.round=msg.round;G.char=CH.find(function(c){return c.id===msg.charId;});G.phrase=msg.phrase;
    G.turnScores=msg.turnScores||[];
    handleMyTurn(msg.turnPlayer);
  }
}

/* ═══ GAME FLOW ═══ */
function startGame(){
  if(G.players.length<2)return;
  G.gameStarted=true;
  G.rounds=CH.sort(function(){return Math.random()-.5;}).slice(0,G.TOTAL_ROUNDS);
  G.round=0;G.scores={};G.turnScores=[];
  G.char=G.rounds[0];G.phrase=pk(PH[G.char.id]);
  broadcast({type:'turn',round:0,charId:G.char.id,phrase:G.phrase,turnPlayer:G.players[0],turnIdx:0,turnScores:[],scores:{}});
  handleMyTurn(G.players[0]);
}

function handleMyTurn(turnPlayer){
  if(turnPlayer===G.name){
    // MY TURN - show record screen
    showRecordScreen();go('p-rec');
  }else{
    // SOMEONE ELSE'S TURN - show waiting screen
    showWaitScreen(turnPlayer);go('p-wait');
  }
}

function nextRound(){
  G.round++;
  if(G.round>=G.TOTAL_ROUNDS){
    broadcast({type:'game_end',scores:G.scores});
    showFinal();return;
  }
  G.char=G.rounds[G.round];G.phrase=pk(PH[G.char.id]);
  broadcast({type:'next_round',round:G.round,charId:G.char.id,phrase:G.phrase,turnPlayer:G.players[0],turnScores:G.turnScores});
  handleMyTurn(G.players[0]);
}

function submitScore(score){
  // Add my score locally
  G.turnScores.push({player:G.name,score:score,round:G.round});
  if(!G.scores[G.name])G.scores[G.name]=0;
  G.scores[G.name]+=score;

  if(G.isHost){
    var roundScores=G.turnScores.filter(function(s){return s.round===G.round;});
    if(roundScores.length>=G.players.length){
      broadcast({type:'round_end',turnScores:G.turnScores,scores:G.scores,round:G.round});
      showRoundSummary();
    }else{
      var nextIdx=roundScores.length;
      broadcast({type:'turn',round:G.round,charId:G.char.id,phrase:G.phrase,turnPlayer:G.players[nextIdx],turnIdx:nextIdx,turnScores:G.turnScores,scores:G.scores});
      handleMyTurn(G.players[nextIdx]);
    }
  }else{
    hostConn.send({type:'score',name:G.name,score:score,round:G.round});
    // Show waiting for others
    showWaitScreen("others to finish");go('p-wait');
  }
}

function showRoundSummary(){
  var rs=G.turnScores.filter(function(s){return s.round===G.round;}).sort(function(a,b){return b.score-a.score;});
  var sorted=Object.entries(G.scores).sort(function(a,b){return b[1]-a[1];});
  var h='<h2 style="font-size:18px;font-weight:800;margin:0 0 2px">Round '+(G.round+1)+' Complete!</h2>';
  h+='<p style="color:#64748b;font-size:11px;margin-bottom:12px">'+G.char.e+' '+G.char.n+'</p>';
  h+='<div class="cd">'+rs.map(function(s,i){return '<div class="rw"><div style="width:24px;height:24px;border-radius:50%;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;background:'+(i===0?'#fbbf24':i===1?'#94a3b8':'#78716c')+'">'+(i+1)+'</div><div style="flex:1;text-align:left"><span style="font-weight:700;font-size:12px;color:'+(s.player===G.name?'#ec4899':'#f1f5f9')+'">'+s.player+(s.player===G.name?' (You)':'')+'</span></div><span style="font-weight:800;font-size:16px;color:'+(i===0?'#fbbf24':'#94a3b8')+'">'+s.score+'</span></div>';}).join('')+'</div>';
  h+='<div class="cd"><div class="lb" style="margin-bottom:4px">Overall Standings</div>'+sorted.map(function(e){return '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:'+(e[0]===G.name?'#ec4899':'#94a3b8')+'">'+e[0]+'</span><span style="font-weight:700;color:#f1f5f9">'+e[1]+'</span></div>';}).join('')+'</div>';
  if(G.isHost){h+='<button class="bt" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)" onclick="nextRound()">'+(G.round+1>=G.TOTAL_ROUNDS?'🏆 Final Results':'Next Round →')+'</button>';}
  else{h+='<p style="color:#a78bfa;font-size:12px;margin-top:12px">Waiting for host...</p>';}
  $('rsumBody').innerHTML=h;go('p-rsum');
}

function showFinal(){
  G.gameStarted=false;
  var sorted=Object.entries(G.scores).sort(function(a,b){return b[1]-a[1];});
  var win=sorted[0][0]===G.name;var col=win?'#fbbf24':'#ec4899';
  var h='<div style="font-size:50px">'+(win?'🏆':'🎉')+'</div>';
  h+='<h2 style="font-size:20px;font-weight:900;margin:6px 0 2px;color:'+col+'">'+(win?'You Win!':sorted[0][0]+' Wins!')+'</h2>';
  h+='<p style="color:#64748b;font-size:10px;margin-bottom:14px">After '+G.TOTAL_ROUNDS+' rounds</p>';
  h+='<div class="cd">'+sorted.map(function(e,i){return '<div class="rw"><div style="font-size:17px">'+(i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1)+'</div><div style="flex:1;text-align:left"><span style="font-weight:700;font-size:13px;color:'+(e[0]===G.name?'#ec4899':'#f1f5f9')+'">'+e[0]+'</span></div><span style="font-weight:800;font-size:17px;color:'+(i===0?'#fbbf24':'#94a3b8')+'">'+e[1]+'</span></div>';}).join('')+'</div>';
  h+='<button class="bt" style="background:rgba(255,255,255,.07)" onclick="go(\'p-home\')">🏠 Home</button>';
  $('finBody').innerHTML=h;go('p-fin');
}

/* ═══ RECORDING & AI ═══ */
function startRec(){
  $('recMicErr').style.display='none';
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}).then(function(str){
    STM=str;ACX=new(window.AudioContext||window.webkitAudioContext)();
    var src=ACX.createMediaStreamSource(str);ANA=ACX.createAnalyser();ANA.fftSize=4096;ANA.smoothingTimeConstant=.3;src.connect(ANA);DA=[];
    COL=setInterval(function(){var f=new Float32Array(ANA.frequencyBinCount);ANA.getFloatFrequencyData(f);var t=new Uint8Array(ANA.fftSize);ANA.getByteTimeDomainData(t);DA.push({f:Array.from(f),t:Array.from(t)});},80);
    MR=new MediaRecorder(str);
    MR.onstart=function(){rtVal=0;$('recTimer').style.display='block';$('bRec').style.display='none';$('bStop').style.display='block';RTI=setInterval(function(){rtVal+=.1;$('timerV').textContent=rtVal.toFixed(1)+'s';},100);drawWave();};
    MR.onstop=function(){clearInterval(COL);clearInterval(RTI);cancelAnimationFrame(WAF);STM.getTracks().forEach(function(t){t.stop();});var feat=xF();ACX.close();analyze(feat);};
    MR.start();setTimeout(function(){if(MR&&MR.state==='recording')MR.stop();},15000);
  }).catch(function(e){$('recMicErr').innerHTML='<div class="cd" style="background:rgba(239,68,68,.1)"><p style="color:#fca5a5;font-size:11px">🎤 '+(e.message||'Mic blocked')+'</p></div>';$('recMicErr').style.display='block';});
}

function doRecCD(){
  $('recCD').style.display='block';$('bRec').style.display='none';
  var n=3;$('recCD').textContent=n;$('recCD').style.color='#22c55e';
  var iv=setInterval(function(){n--;if(n>0){$('recCD').textContent=n;$('recCD').style.color=n<=1?'#ef4444':'#fbbf24';}else{clearInterval(iv);$('recCD').style.display='none';startRec();}},1000);
}

function drawWave(){if(!ANA)return;var cv=$('wav'),ctx=cv.getContext('2d'),buf=new Uint8Array(ANA.fftSize);(function lp(){WAF=requestAnimationFrame(lp);ANA.getByteTimeDomainData(buf);ctx.fillStyle='rgba(8,12,22,.4)';ctx.fillRect(0,0,cv.width,cv.height);ctx.lineWidth=2;ctx.strokeStyle='#ec4899';ctx.shadowBlur=5;ctx.shadowColor='#ec4899';ctx.beginPath();var sw=cv.width/buf.length;for(var i=0;i<buf.length;i++){var y=(buf[i]/128)*cv.height/2;i?ctx.lineTo(i*sw,y):ctx.moveTo(0,y);}ctx.stroke();ctx.shadowBlur=0;})();}

function xF(){
  if(!DA||DA.length<5)return null;
  var rms=DA.map(function(fr){var s=0;for(var i=0;i<fr.t.length;i++){var v=(fr.t[i]-128)/128;s+=v*v;}return Math.sqrt(s/fr.t.length);});
  var aR=rms.reduce(function(a,b){return a+b;},0)/rms.length;
  var rV=rms.reduce(function(s,v){return s+Math.pow(v-aR,2);},0)/rms.length;
  var cn=DA.map(function(fr){var n=0,d=0;for(var i=0;i<fr.f.length;i++){var m=Math.pow(10,fr.f[i]/20);n+=i*10.77*m;d+=m;}return d>0?n/d:0;});
  var aC=cn.reduce(function(a,b){return a+b;},0)/cn.length;
  var cV=cn.reduce(function(s,v){return s+Math.pow(v-aC,2);},0)/cn.length;
  var jp=[];for(var i=1;i<cn.length;i++)jp.push(Math.abs(cn[i]-cn[i-1]));
  var aJ=jp.length?jp.reduce(function(a,b){return a+b;},0)/jp.length:0;
  var lh=DA.map(function(fr){var q=Math.floor(fr.f.length/4);var lo=fr.f.slice(0,q).reduce(function(a,b){return a+Math.pow(10,b/20);},0);var hi=fr.f.slice(q*3).reduce(function(a,b){return a+Math.pow(10,b/20);},0);return hi>0?lo/hi:50;});
  var aL=lh.reduce(function(a,b){return a+b;},0)/lh.length;
  var si=rms.filter(function(v){return v<.02;}).length;var pR=si/rms.length;
  var pk2=0;for(var i=1;i<rms.length-1;i++)if(rms[i]>rms[i-1]&&rms[i]>rms[i+1]&&rms[i]>aR*.7)pk2++;
  var wpm=rtVal>0?(pk2/rtVal)*30:0;var sl=rms.length>1?(rms[rms.length-1]-rms[0])/(rms.length-1):0;
  return{aR:aR,rV:rV,aC:aC,cV:cV,aJ:aJ,aL:aL,pR:pR,wpm:Math.round(wpm),sl:sl,dur:rtVal,
    dp:aL>4||aC<200,vD:aL>8||aC<150,hi:aL<1.5||aC>350,vH:aL<1||aC>450,
    sw:wpm<80||pR>.3,fa:wpm>140,ld:aR>.25,qt:aR<.1,
    ex:rV>.01||cV>5000,vE:rV>.02||cV>10000,mn:cV<1000&&rV<.003,
    gr:aL>3&&aR>.15,er:aJ>100,pa:pR>.25};
}

/* AI SCORING */
function analyze(f){
  $('bStop').style.display='none';$('recTimer').style.display='none';
  $('recAnalyze').innerHTML='<div style="text-align:center;padding:12px"><div style="width:28px;height:28px;border:3px solid #8b5cf6;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px"></div><p style="font-size:12px;font-weight:700;color:#a78bfa">🧠 AI analyzing your '+G.char.n+'...</p></div>';
  $('recAnalyze').style.display='block';

  // Try Anthropic API first
  aiAnalyze(f).then(function(sc){
    $('recAnalyze').style.display='none';
    G.myScore=sc;showResult(sc);go('p-res');
  });
}

function aiAnalyze(f){
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
      messages:[{role:"user",content:"You are the world's top voice impression judge. Score this impression.\n\nCHARACTER: "+G.char.n+" ("+G.char.a+" in "+G.char.m+")\nVOICE PROFILE: "+G.char.vd+"\nPHRASE: \""+G.phrase+"\"\nDURATION: "+f.dur.toFixed(1)+"s\n\nAUDIO FEATURES:\n- Spectral centroid: "+f.aC.toFixed(0)+"Hz ("+(f.vD?"very deep":f.dp?"deep":f.vH?"very high":f.hi?"high":"medium")+")\n- Low/High ratio: "+f.aL.toFixed(1)+" ("+(f.aL>6?"very bass-heavy":f.aL>3?"bass-heavy":f.aL<1.5?"treble-heavy":"balanced")+")\n- Energy: "+f.aR.toFixed(3)+" ("+(f.qt?"very quiet":f.ld?"loud":"moderate")+")\n- Variance: "+f.rV.toFixed(4)+" ("+(f.mn?"monotone":f.vE?"very expressive":f.ex?"expressive":"steady")+")\n- Pitch jumps: "+f.aJ.toFixed(0)+" ("+(f.er?"erratic":"stable")+")\n- Pause ratio: "+(f.pR*100).toFixed(0)+"%\n- Est. pace: ~"+f.wpm+" WPM ("+(f.sw?"slow":f.fa?"fast":"moderate")+")\n- Gravelly: "+(f.gr?"yes":"no")+"\n\nBe fair (40-75 typical, 85+ exceptional). Respond ONLY JSON (no markdown):\n{\"total\":<1-100>,\"pitch\":<1-100>,\"tone\":<1-100>,\"timing\":<1-100>,\"expression\":<1-100>,\"feedback\":\"<2 sentences>\",\"reaction\":\"<funny in-character quote>\"}"}]})
  }).then(function(r){return r.json();}).then(function(d){
    var txt=d.content.map(function(c){return c.text||"";}).join("");
    return JSON.parse(txt.replace(/```json|```/g,"").trim());
  }).catch(function(){return localScore(f);});
}

function localScore(f){
  if(!f||f.dur<.5)return{total:15,pitch:15,tone:15,timing:15,expression:15,feedback:"Too short!",reaction:""};
  var base=40+Math.random()*30;
  if(f.dp&&(G.char.id===3||G.char.id===9||G.char.id===17))base+=15;
  if(f.hi&&(G.char.id===2||G.char.id===10))base+=15;
  if(f.sw&&(G.char.id===1||G.char.id===3||G.char.id===11))base+=10;
  if(f.ex&&(G.char.id===6||G.char.id===15))base+=12;
  var t=cl(base,15,95);return{total:t,pitch:cl(t+Math.random()*16-8,5,98),tone:cl(t+Math.random()*16-8,5,98),timing:cl(t+Math.random()*16-8,5,98),expression:cl(t+Math.random()*16-8,5,98),feedback:"Score: "+t+"/100. Keep practicing!",reaction:""};
}

function showResult(sc){
  var g=sc.total>=90?{g:"S+",c:"#ffd700",t:"LEGENDARY!"}:sc.total>=78?{g:"A",c:"#22c55e",t:"Amazing!"}:sc.total>=62?{g:"B",c:"#3b82f6",t:"Great!"}:sc.total>=45?{g:"C",c:"#fbbf24",t:"Not Bad!"}:sc.total>=28?{g:"D",c:"#f97316",t:"Keep Trying!"}:{g:"F",c:"#ef4444",t:"Try Again!"};
  var h='<div style="font-size:58px;font-weight:900;color:'+g.c+';text-shadow:0 0 30px '+g.c+'55;line-height:1">'+g.g+'</div>';
  h+='<p style="font-size:15px;font-weight:700;color:'+g.c+';margin:4px 0">'+g.t+'</p>';
  h+='<p style="color:#64748b;font-size:10px">'+G.char.e+' '+G.char.n+'</p>';
  h+='<div class="cd" style="margin-top:10px"><span id="sNum" style="font-size:40px;font-weight:900;color:'+g.c+'">0</span><span style="font-size:14px;color:#475569">/100</span></div>';
  h+='<div class="cd" style="text-align:left">';
  [{l:"🎵 Pitch",v:sc.pitch,c:"#8b5cf6"},{l:"🎭 Tone",v:sc.tone,c:"#ec4899"},{l:"⏱ Timing",v:sc.timing,c:"#06b6d4"},{l:"✨ Expression",v:sc.expression,c:"#f59e0b"}].forEach(function(b,i){
    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-bottom:2px"><span>'+b.l+'</span><span style="font-weight:700;color:'+b.c+'">'+b.v+'%</span></div><div class="bar-t"><div class="bar-f" id="b'+i+'" style="background:'+b.c+';box-shadow:0 0 8px '+b.c+'44"></div></div></div>';
  });
  h+='</div>';
  if(sc.feedback){h+='<div class="cd" style="text-align:left;background:rgba(139,92,246,.06)"><div class="lb" style="margin-bottom:3px">🧠 AI Coach</div><p style="font-size:11px;color:#e2e8f0;line-height:1.4;margin:0">'+sc.feedback+'</p></div>';}
  if(sc.reaction){h+='<div class="cd" style="text-align:left;background:'+G.char.c+'10"><div class="lb" style="margin-bottom:2px">'+G.char.e+' says:</div><p style="font-size:12px;color:'+G.char.c+';font-style:italic;margin:0">"'+sc.reaction+'"</p></div>';}
  h+='<button class="bt" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)" onclick="submitScore('+sc.total+')">Continue →</button>';
  $('resBody').innerHTML=h;
  setTimeout(function(){aN($('sNum'),sc.total);},200);
  setTimeout(function(){$('b0').style.width=sc.pitch+'%';},300);
  setTimeout(function(){$('b1').style.width=sc.tone+'%';},450);
  setTimeout(function(){$('b2').style.width=sc.timing+'%';},600);
  setTimeout(function(){$('b3').style.width=sc.expression+'%';},750);
}

/* ═══ SOLO MODE ═══ */
function goSolo(){
  if(!nm())return;
  $('charGrid').innerHTML=CH.map(function(c){return '<div style="cursor:pointer;text-align:center;padding:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);border-radius:16px" data-id="'+c.id+'"><div style="font-size:28px;margin-bottom:2px">'+c.e+'</div><div style="font-weight:700;font-size:11px">'+c.n+'</div><div style="font-size:8px;color:#64748b;margin-bottom:3px">'+c.m+'</div><span style="font-size:8px;padding:2px 7px;border-radius:10px;font-weight:600;background:'+(c.d==='Easy'?'rgba(34,197,94,.15);color:#22c55e':c.d==='Medium'?'rgba(251,191,36,.15);color:#fbbf24':'rgba(239,68,68,.15);color:#ef4444')+'">'+c.d+'</span></div>';}).join('');
  $('charGrid').onclick=function(e){var cc=e.target.closest('[data-id]');if(!cc)return;var id=parseInt(cc.dataset.id);G.char=CH.find(function(c){return c.id===id;});G.phrase=pk(PH[G.char.id]);G.isHost=true;G.players=[G.name];G.round=0;G.TOTAL_ROUNDS=1;G.scores={};G.turnScores=[];showRecordScreen();go('p-rec');};
  go('p-chars');
}
